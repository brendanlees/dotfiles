# Global theme registry.
#
# Active theme is selected via `theme:` in defaults.yml.
# Each theme provides a semantic palette (used by hex-color templates) and
# an apps map (used by templates that reference the theme by name).
#
# Adding a theme: define every key in `palette` and every key in `apps`.
themes:

  tokyonight-night:
    palette:
      bg: "#1a1b26"
      surface: "#292e42"
      surface_alt: "#394b70"
      border: "#414868"
      comment: "#565f89"
      muted: "#a9b1d6"
      fg: "#c0caf5"
      accent: "#73daca"
      primary: "#7aa2f7"
      primary_alt: "#769ff0"
      secondary: "#bb9af7"
      success: "#9ece6a"
      warn: "#e0af68"
      error: "#f7768e"
      info: "#7dcfff"
      info_alt: "#2ac3de"
      orange: "#ff9e64"
      tool_pending_bg: "#1f2230"
      tool_success_bg: "#202329"
      tool_error_bg: "#271d27"
    apps:
      ghostty: "TokyoNight Night"
      btop: "tokyonight_night"
      bat: "tokyonight_night"
      glow: "tokyo-night"
      starship: "tokyo-night"
      tmux_ukiyo: "tokyonight/night"
      zed: "Tokyo Night"
      nvim: "tokyonight-night"
      nvim_background: "dark"

