matches:
  # CSS > Media Query - Phone
  - trigger: ".mq-md"
    replace: |
      @media (max-width: 768px) {
      	$|$
      }

  # CSS > Media Query - Small Phone
  - trigger: ".mq-sm"
    replace: |
      @media (max-width: 480px) {
      	$|$
      }

  # CSS > Media Query - Blank
  - trigger: ".mq--"
    replace: |
      @media (min-width: ) and (max-width: ) {
      	$|$
      }

  # CSS > Quick Spacing Utilities
  - trigger: ".utspace"
    replace: |
      --space-m: 1rem;
      --space-l: calc(var(--space-m)*2);
      --space-xl: calc(var(--space-m)*4);

  # CSS > Data Selector
  - trigger: ".csdata"
    replace: '[class*="example"]'

  # HTML > Break
  - trigger: "<br"
    replace: "<br/>"

  # HTML > New break space
  - trigger: "&nb"
    replace: "&nbsp;"

  # HTML > </bl> branding
  - trigger: ".bl-branding"
    replace: "&lt;/bl&gt;"
