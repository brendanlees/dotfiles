matches:
  # Web Ipsum > Headline (s)
  - trigger: ".wipshs"
    replace: "This is just a placeholder."

  # Web Ipsum > Headline (m)
  - trigger: ".wipshm"
    replace: "This is just a placeholder headline."

  # Web Ipsum > Headline (l)
  - trigger: ".wipshl"
    replace: "This is just a placeholder headline, we will replace it once your website copy is finalized."

  # Web Ipsum > Paragraph (s)
  - trigger: ".wipsps"
    replace: "This is just placeholder text. Don't be alarmed, this is just here to fill up space since your finalised copy isn't ready yet. Once we have your content finalised, we'll replace this placeholder text with your real content."

  # Web Ipsum > Paragraph (m)
  - trigger: ".wipspm"
    replace: |
      This is just placeholder text. Don't be alarmed, this is just here to fill up space since your finalised copy isn't ready yet. Once we have your content finalised, we'll replace this placeholder text with your real content.

      Sometimes it's nice to put in text just to get an idea of how text will fill in a space on your website.

      Traditionally our industry has used Lorem Ipsum, which is placeholder text written in Latin. Unfortunately, not everyone is familiar with Lorem Ipsum and that can lead to confusion. I can't tell you how many times clients have asked me why their website is in another language!

  # Web Ipsum > Paragraph (l)
  - trigger: ".wipspl"
    replace: |
      This is just placeholder text. Don't be alarmed, this is just here to fill up space since your finalised copy isn't ready yet. Once we have your content finalised, we'll replace this placeholder text with your real content.

      Sometimes it's nice to put in text just to get an idea of how text will fill in a space on your website.

      Traditionally our industry has used Lorem Ipsum, which is placeholder text written in Latin. Unfortunately, not everyone is familiar with Lorem Ipsum and that can lead to confusion. I can't tell you how many times clients have asked me why their website is in another language!

      There are other placeholder text alternatives like Hipster Ipsum, Zombie Ipsum, Bacon Ipsum, and many more. While often hilarious, these placeholder passages can also lead to much of the same confusion.

      If you're curious, this is Website Ipsum. It was specifically developed for the use on development websites. Other than being less confusing than other Ipsum's, Website Ipsum is also formatted in patterns more similar to how real copy is formatted on the web today.

  # Web Ipsum > List (Bullet)
  - trigger: ".wipslb"
    replace: |
      <ul>
        <li>This is just a placeholder</li>
        <li>We will change this out later</li>
        <li>We're using Website Ipsum</li>
        <li>It's just meant to fill space</li>
        <li>Until your content is ready</li>
      </ul>

  # Web Ipsum > List (Numbered)
  - trigger: ".wipsln"
    replace: |
      <ol>
        <li>This is just a placeholder</li>
        <li>We will change this out later</li>
        <li>We're using Website Ipsum</li>
        <li>It's just meant to fill space</li>
        <li>Until your content is ready</li>
      </ol>
