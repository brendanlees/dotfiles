matches:
  # wk — cursor lands inside [brackets] for Who, arrow right to fill What
  - trigger: ";;pfwk"
    replace: "[$|$] -  - {{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%Y-%m-%d"

  # ws — cursor lands at What position
  - trigger: ";;pfws"
    replace: "[ws] - $|$ - {{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%Y-%m-%d"

  # sd — cursor lands inside [brackets] for Prefix, arrow right to fill What
  - trigger: ";;pfsd"
    replace: "[$|$] -  - {{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%Y-%m-%d"
